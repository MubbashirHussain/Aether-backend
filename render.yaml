services:
  - type: web
    name: aetherbackend
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "https://aether-nine-weld.vercel.app"
      - key: CACHE_TTL_MINUTES
        value: 30
      - key: RATE_LIMIT_REQUESTS
        value: 20
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 1
      - key: MAX_CONCURRENT_JOBS
        value: 3
      - key: YTDLP_TIMEOUT_MS
        value: 30000
      - key: DOWNLOAD_UNLOCK_SECONDS
        value: 5
